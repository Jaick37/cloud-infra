version: '3'
services:
  frontend:
    build: ./frontend
    ports:
       - "8888:80"
       - "8443:443"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: tododb
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
