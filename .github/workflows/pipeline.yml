name: Capstone CI/CD Pipeline

on: [push]

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Bandit SAST scan
        run: |
          pip install bandit
          bandit -r app/backend -f txt

  build-images:
    runs-on: ubuntu-latest
    needs: sast-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build backend image
        run: docker build -t todo-backend:${{ github.sha }} ./app/backend

      - name: Generate self-signed SSL cert for build
        run: |
          mkdir -p app/frontend/ssl
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout app/frontend/ssl/nginx.key \
            -out app/frontend/ssl/nginx.crt \
            -subj "/CN=localhost"
      - name: Build frontend image
        run: docker build -t todo-frontend:${{ github.sha }} ./app/frontend

  dast-scan:
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build backend image
        run: docker build -t todo-backend:${{ github.sha }} ./app/backend

      - name: Run backend container
        run: docker run -d -p 5000:5000 --name backend-test todo-backend:${{ github.sha }}

      - name: Wait for app to be ready
        run: sleep 5

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000'
          fail_action: false
          allow_issue_writing: false
